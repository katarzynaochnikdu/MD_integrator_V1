<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Test – Medidesk Integrator</title>
  <script src="https://www.google.com/recaptcha/api.js?render=__RECAPTCHA_SITE_KEY__"></script>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 32rem; margin: 2rem auto; padding: 0 1rem; }
    label { display: block; margin-top: 0.75rem; font-weight: 600; }
    input, select, textarea { width: 100%; box-sizing: border-box; margin-top: 0.25rem; padding: 0.5rem; }
    button { margin-top: 1rem; padding: 0.6rem 1rem; cursor: pointer; }
    #out { margin-top: 1rem; white-space: pre-wrap; font-size: 0.9rem; }
    .err { color: #b00; }
    .ok { color: #060; }
  </style>
</head>
<body>
  <h1>Test integracji Medidesk</h1>
  <p>Token reCAPTCHA jest pobierany automatycznie po kliknięciu „Wyślij” – nic nie kopiujesz.</p>
  <form id="f">
    <label>Imię i nazwisko <input name="fullName" required value="Jan Kowalski" /></label>
    <label>Telefon <input name="phone" required value="+48500600700" /></label>
    <label>E-mail <input name="email" type="email" value="jan@example.com" /></label>
    <label>W czym możemy pomóc?
      <select name="topic">
        <option>Umówienie wizyty</option>
        <option>Umówienie badań - USG</option>
        <option>Odwołanie wizyty</option>
        <option>Zmiana terminu</option>
        <option selected>Inna</option>
      </select>
    </label>
    <label>Dodatkowa informacja <textarea name="message" rows="4" required>Treść testowa z demo strony.</textarea></label>
    <label><input type="checkbox" name="consent" checked /> Zgoda na kontakt zwrotny</label>
    <button type="submit">Wyślij do Medidesk (przez integrator)</button>
  </form>
  <div id="out"></div>
  <script>
    const SITE_KEY = "__RECAPTCHA_SITE_KEY__";
    const API = "/api/medidesk/contact";
    const out = document.getElementById("out");
    document.getElementById("f").addEventListener("submit", function (e) {
      e.preventDefault();
      out.textContent = "Pobieranie tokenu reCAPTCHA…";
      out.className = "";
      const fd = new FormData(e.target);
      const consent = fd.get("consent") === "on";
      const bodyBase = {
        fullName: fd.get("fullName"),
        phone: fd.get("phone"),
        email: fd.get("email") || null,
        topic: fd.get("topic"),
        message: fd.get("message"),
        consent: consent,
      };
      grecaptcha.ready(function () {
        grecaptcha.execute(SITE_KEY, { action: "submit" }).then(function (token) {
          out.textContent = "Wysyłanie…";
          return fetch(API, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(Object.assign({ captchaToken: token }, bodyBase)),
          });
        }).then(function (res) {
          return res.json().then(function (data) {
            if (res.ok) {
              out.className = "ok";
              out.textContent = "OK (" + res.status + "): " + JSON.stringify(data, null, 2);
            } else {
              out.className = "err";
              out.textContent = "Błąd HTTP " + res.status + ":\n" + JSON.stringify(data, null, 2);
            }
          });
        }).catch(function (err) {
          out.className = "err";
          out.textContent = "Błąd: " + err;
        });
      });
    });
  </script>
</body>
</html>

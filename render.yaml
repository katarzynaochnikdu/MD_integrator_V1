# Render Blueprint: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: md-integrator-v1
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: MEDIDESK_DEMO_PAGE_ENABLED
        value: "true"
